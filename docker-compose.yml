services:
  storyvenue-api:
    build:
      context: ./server
    container_name: storyvenue-api
    env_file:
      - ./server/.env
    environment:
      APP_ENV: production
      ALLOW_DEV_USER_HEADER: "false"
      OPENAI_TTS_OUTPUT_DIR: /app/.generated-audio
    ports:
      - "${STORYVENUE_API_PORT:-8000}:8000"
    volumes:
      - storyvenue_generated_audio:/app/.generated-audio
    restart: unless-stopped

volumes:
  storyvenue_generated_audio:
